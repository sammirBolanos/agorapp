spring.application.name=demo

# --- Base de datos ---
# Sin variables: H2 en memoria (desarrollo local).
# Neon / Postgres: exporta SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME y SPRING_DATASOURCE_PASSWORD
# (plantilla en demo/env.example).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true

security.jwt.secret=${SECURITY_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
security.jwt.expiration-seconds=3600

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.seed-demo-user=true
